name: 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        较大改动建议先开 Issue 讨论。可参考 [PRD](https://github.com/xiongxianzhu/xblog/blob/main/docs/prd-xblog.md) 中的 Non-Goals。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 从用户 / 作者视角描述痛点
      placeholder: 作为博客作者，我希望…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你期望的行为或实现思路（可简略）
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 主要影响
      options:
        - 公开站
        - 管理后台
        - 后端 API
        - 部署 / 运维
        - 文档 / 开发者体验
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 PR 实现此功能
          required: false
