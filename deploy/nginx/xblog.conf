# xblog Monorepo — nginx 反向代理示例
#
# 路由约定（与 PRD / systemd 一致）：
#   /        → Next.js  (127.0.0.1:3000)
#   /api/    → FastAPI  (127.0.0.1:8000)，含 /api/v1/uploads 静态文件
#
# 使用前请替换 server_name、证书路径，并按 VPS 路径调整 upstream。

upstream xblog_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream xblog_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # 头像、Skill 包等上传；按需调大
    client_max_body_size 32m;

    access_log /var/log/nginx/xblog.access.log;
    error_log /var/log/nginx/xblog.error.log;

    # FastAPI API（含 SSE 流式 AI、/api/v1/uploads）
    location /api/ {
        proxy_pass http://xblog_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # AI SSE / 长连接：避免缓冲导致流式卡顿
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Next.js 公开站 + /admin
    location / {
        proxy_pass http://xblog_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

